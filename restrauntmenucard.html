<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
        }

        .menu {
            width: 300px;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px #aaa;
        }

        h2 {
            text-align: center;
            color: #e74c3c;
        }

        .item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
    </style>
</head>

<body>

    <div class="menu">
        <h2>🍽 Restaurant Menu</h2>

        <div class="item"><span>Burger</span><span>₹120</span></div>
        <div class="item"><span>Pizza</span><span>₹250</span></div>
        <div class="item"><span>Pasta</span><span>₹180</span></div>
        <div class="item"><span>Cold Coffee</span><span>₹90</span></div>
        <div class="item"><span>Ice Cream</span><span>₹80</span></div>

    </div>

</body>

</html>
