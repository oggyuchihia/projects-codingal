<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Progress</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">


    <div class="container text-center py-4">
        <h1>Study Progress</h1>
        <p>Track your learning journey</p>
    </div>

    <div class="container">
        <div class="row g-3">

            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h3>12</h3>
                        <p>Lessons Completed</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h3>5</h3>
                        <p>Badges Earned</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card text-center">
                    <div class="card-body">
                        <h3>80%</h3>
                        <p>Overall Progress</p>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <div class="container mt-4">
        <h5>Progress</h5>
        <div class="progress">
            <div class="progress-bar bg-success" style="width:80%;">
                80%
            </div>
        </div>
    </div>

 
    <div class="container mt-5">
        <h3 class="mb-3">Subjects</h3>

        <button class="btn btn-primary m-1">Mathematics</button>
        <button class="btn btn-success m-1">Science</button>
        <button class="btn btn-warning m-1">English</button>
        <button class="btn btn-danger m-1">History</button>
        <button class="btn btn-info m-1">Computer</button>
    </div>

</body>

</html>
